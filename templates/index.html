<!DOCTYPE html>
<html>
<head>
<title>College Chatbot</title>

<style>
body {
    font-family: Arial;
}

/* Chat Button */
.chat-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #007bff;
    color: white;
    border: none;
    padding: 15px;
    border-radius: 50%;
    cursor: pointer;
}

/* Chat Box */
.chat-box {
    position: fixed;
    bottom: 80px;
    right: 20px;
    width: 320px;
    height: 450px;
    background: white;
    border-radius: 10px;
    box-shadow: 0px 0px 15px gray;
    display: none;
    flex-direction: column;
}

/* Header */
.chat-header {
    background: #007bff;
    color: white;
    padding: 10px;
    border-top-left-radius: 10px;
    border-top-right-radius: 10px;
}

/* Chat messages */
.chat-messages {
    flex: 1;
    padding: 10px;
    overflow-y: auto;
}

/* Messages */
.message {
    padding: 8px;
    margin: 5px;
    border-radius: 10px;
    max-width: 70%;
}

.user {
    background: #dcf8c6;
    margin-left: auto;
}

.bot {
    background: #ececec;
}

/* Input area */
.chat-input {
    display: flex;
    padding: 10px;
}

.chat-input input {
    flex: 1;
    padding: 5px;
}

.chat-input button {
    margin-left: 5px;
}
</style>
</head>

<body>

<button class="chat-btn" onclick="toggleChat()">💬</button>

<div class="chat-box" id="chatBoxContainer">
    <div class="chat-header">College Assistant 🤖</div>

    <div class="chat-messages" id="chatBox"></div>

    <div style="padding:5px;">
        <button onclick="quickReply('courses')">Courses</button>
        <button onclick="quickReply('fees')">Fees</button>
        <button onclick="quickReply('placement')">Placement</button>
    </div>

    <div class="chat-input">
        <input id="userInput" type="text" placeholder="Type message...">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
function toggleChat() {
    let box = document.getElementById("chatBoxContainer");
    box.style.display = box.style.display === "none" ? "flex" : "none";
}

function sendMessage(msg=null) {
    let input = msg || document.getElementById("userInput").value;

    fetch("/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message: input})
    })
    .then(res => res.json())
    .then(data => {
        let chat = document.getElementById("chatBox");

        chat.innerHTML += "<div class='message user'>" + input + "</div>";

        let botMsg = document.createElement("div");
        botMsg.className = "message bot";
        botMsg.innerHTML = "Typing...";
        chat.appendChild(botMsg);

        setTimeout(() => {
            botMsg.innerHTML = data.response;
        }, 800);

        chat.scrollTop = chat.scrollHeight;
    });
}

function quickReply(text) {
    sendMessage(text);
}
</script>

</body>
</html>
