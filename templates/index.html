<!DOCTYPE html>
<html>
<head>
<title>College Chatbot</title>

<style>
body {
    font-family: Arial;
}

/* Chat Button */
.chat-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: green;
    color: white;
    border: none;
    padding: 15px;
    border-radius: 50%;
    cursor: pointer;
}

/* Chat Box */
.chat-box {
    position: fixed;
    bottom: 80px;
    right: 20px;
    width: 300px;
    background: white;
    border-radius: 10px;
    box-shadow: 0px 0px 10px gray;
    display: none;
    padding: 10px;
}

.message {
    padding: 8px;
    margin: 5px;
    border-radius: 10px;
}

.user {
    background: #dcf8c6;
    text-align: right;
}

.bot {
    background: #ececec;
    text-align: left;
}
</style>

</head>

<body>

<button class="chat-btn" onclick="toggleChat()">💬</button>

<div class="chat-box" id="chatBoxContainer">
    <h4>College Chatbot 🤖</h4>

    <div id="chatBox"></div>

    <input id="userInput" type="text" placeholder="Type message...">
    <button onclick="sendMessage()">Send</button>

    <br><br>

    <button onclick="quickReply('courses')">Courses</button>
    <button onclick="quickReply('fees')">Fees</button>
    <button onclick="quickReply('admission')">Admission</button>
    <button onclick="quickReply('contact')">Contact</button>
</div>

<script>
function toggleChat() {
    let box = document.getElementById("chatBoxContainer");
    box.style.display = box.style.display === "none" ? "block" : "none";
}

function sendMessage(msg=null) {
    let input = msg || document.getElementById("userInput").value;

    fetch("/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message: input})
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("chatBox").innerHTML += 
        "<div class='message user'>" + input + "</div>" +
        "<div class='message bot'>" + data.response + "</div>";
    });
}

function quickReply(text) {
    sendMessage(text);
}
</script>

</body>
</html>
