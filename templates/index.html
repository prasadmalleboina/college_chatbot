<!DOCTYPE html>
<html>
<head>
    <title>College Assistant</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            overflow-x: hidden;
        }

        /* HERO SECTION */
        .hero {
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
                        url("https://images.unsplash.com/photo-1523240795612-9a054b0db644");
            background-size: cover;
            background-position: center;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .hero h1 {
            font-size: 50px;
            animation: fadeIn 2s ease-in;
        }

        .hero p {
            font-size: 20px;
            margin-top: 10px;
            animation: fadeIn 3s ease-in;
        }

        .btn {
            margin-top: 20px;
            padding: 12px 25px;
            background: #007bff;
            border: none;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }

        .btn:hover {
            background: #0056b3;
        }

        /* SECTION */
        .section {
            padding: 60px;
            text-align: center;
        }

        .cards {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .card {
            width: 250px;
            padding: 20px;
            background: #f4f4f4;
            border-radius: 10px;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-10px);
        }

        /* CHATBOT */
        .chat-container {
            width: 350px;
            height: 500px;
            position: fixed;
            bottom: 80px;
            right: 20px;
            background: white;
            border-radius: 12px;
            box-shadow: 0px 0px 15px rgba(0,0,0,0.2);
            display: none;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: #007bff;
            color: white;
            padding: 15px;
        }

        .chat-box {
            flex: 1;
            padding: 10px;
            overflow-y: auto;
        }

        .msg {
            margin: 8px 0;
            padding: 10px;
            border-radius: 10px;
            max-width: 70%;
        }

        .user {
            background: #d1e7dd;
            margin-left: auto;
        }

        .bot {
            background: #e2e3e5;
        }

        .input-area {
            display: flex;
            padding: 10px;
        }

        input {
            flex: 1;
            padding: 8px;
        }

        button {
            margin-left: 5px;
            padding: 8px;
            background: #007bff;
            color: white;
            border: none;
        }

        .chat-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #007bff;
            color: white;
            padding: 15px;
            border-radius: 50%;
            cursor: pointer;
        }

        /* ANIMATION */
        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(20px);}
            to {opacity: 1; transform: translateY(0);}
        }
    </style>
</head>

<body>

<!-- HERO -->
<div class="hero">
    <h1>Welcome to Our College 🎓</h1>
    <p>Your future starts here</p>
    <button class="btn" onclick="toggleChat()">Ask Assistant</button>
</div>

<!-- FEATURES -->
<div class="section">
    <h2>Why Choose Us?</h2>
    <div class="cards">
        <div class="card">📚 Quality Education</div>
        <div class="card">🏢 Top Placements</div>
        <div class="card">🏠 Hostel Facilities</div>
    </div>
</div>

<!-- CHATBOT -->
<div class="chat-container" id="chat">
    <div class="chat-header">College Assistant 🤖</div>
    <div class="chat-box" id="chatBox"></div>

    <div class="input-area">
        <input type="text" id="msg" placeholder="Type message..." onkeypress="handleKey(event)">
        <button onclick="sendMsg()">Send</button>
    </div>
</div>

<div class="chat-toggle" onclick="toggleChat()">💬</div>

<script>
function toggleChat() {
    let chat = document.getElementById("chat");
    chat.style.display = chat.style.display === "none" ? "flex" : "none";
}

function appendMessage(text, type) {
    let box = document.getElementById("chatBox");
    let msg = document.createElement("div");
    msg.className = "msg " + type;
    msg.innerText = text;
    box.appendChild(msg);
    box.scrollTop = box.scrollHeight;
}

function sendMsg() {
    let input = document.getElementById("msg");
    let text = input.value;

    if (!text) return;

    appendMessage(text, "user");
    input.value = "";

    appendMessage("Typing...", "bot");

    fetch("/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message: text})
    })
    .then(res => res.json())
    .then(data => {
        let msgs = document.querySelectorAll(".bot");
        msgs[msgs.length - 1].innerText = data.response;
    });
}

function handleKey(e) {
    if (e.key === "Enter") sendMsg();
}
</script>

</body>
</html>
