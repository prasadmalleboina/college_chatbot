<!DOCTYPE html>
<html>
<head>
    <title>College Chatbot</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
        }

        .chat-container {
            width: 350px;
            height: 500px;
            position: fixed;
            bottom: 80px;
            right: 20px;
            background: white;
            border-radius: 12px;
            box-shadow: 0px 0px 15px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: #007bff;
            color: white;
            padding: 15px;
            font-weight: bold;
        }

        .chat-box {
            flex: 1;
            padding: 10px;
            overflow-y: auto;
        }

        .msg {
            margin: 8px 0;
            padding: 10px;
            border-radius: 10px;
            max-width: 70%;
        }

        .user {
            background: #d1e7dd;
            margin-left: auto;
        }

        .bot {
            background: #e2e3e5;
        }

        .input-area {
            display: flex;
            padding: 10px;
            border-top: 1px solid #ddd;
        }

        input {
            flex: 1;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            margin-left: 5px;
            padding: 8px 12px;
            border: none;
            background: #007bff;
            color: white;
            border-radius: 6px;
            cursor: pointer;
        }

        .chat-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #007bff;
            color: white;
            padding: 15px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
        }
    </style>
</head>

<body>

<div class="chat-container" id="chat" style="display:none;">
    <div class="chat-header">College Assistant 🤖</div>

    <div class="chat-box" id="chatBox"></div>

    <div class="input-area">
        <input type="text" id="msg" placeholder="Type message..." onkeypress="handleKey(event)">
        <button onclick="sendMsg()">Send</button>
    </div>
</div>

<div class="chat-toggle" onclick="toggleChat()">💬</div>

<script>
function toggleChat() {
    let chat = document.getElementById("chat");
    chat.style.display = chat.style.display === "none" ? "flex" : "none";
}

function appendMessage(text, type) {
    let box = document.getElementById("chatBox");
    let msg = document.createElement("div");
    msg.className = "msg " + type;
    msg.innerText = text;
    box.appendChild(msg);
    box.scrollTop = box.scrollHeight;
}

function sendMsg() {
    let input = document.getElementById("msg");
    let text = input.value;

    if (!text) return;

    appendMessage(text, "user");
    input.value = "";

    // typing effect
    appendMessage("Typing...", "bot");

    fetch("/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({message: text})
    })
    .then(res => res.json())
    .then(data => {
        let msgs = document.querySelectorAll(".bot");
        msgs[msgs.length - 1].innerText = data.response;
    });
}

function handleKey(e) {
    if (e.key === "Enter") {
        sendMsg();
    }
}
</script>

</body>
</html>
